<ion-header>
    <ion-toolbar color="primary">
      <ion-buttons slot="start">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>Contas</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <ion-row style="margin: 20px;">
      <form [formGroup]="dadoForm" (ngSubmit)="onSubmit()" style="width: 100%;">
        <ion-item>
          <ion-label position="floating">Descrição:</ion-label>
          <ion-input type="text" formControlName="descricao"></ion-input>
        </ion-item>
  
        <ion-item>
          <ion-label position="floating">Valor:</ion-label>
          <ion-input type="number" formControlName="valor"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label position="floating">Parcela:</ion-label>
          <ion-input type="number" formControlName="parcelas"></ion-input>
        </ion-item>

        <ion-item>
          <ion-label>Selecione um ícone:</ion-label>
        </ion-item>
        
        <ion-item>
          <ion-segment formControlName="icone">
            <ion-grid>
              <ion-row *ngFor="let row of iconRows">
                <ion-col *ngFor="let iconName of row" (click)="setSelectedIcon(iconName)">
                  <ion-segment-button [value]="iconName" 
                                      [class.selected]="icone == iconName">
                    <ion-icon [name]="iconName"></ion-icon>
                  </ion-segment-button>
                </ion-col>
              </ion-row>
            </ion-grid>
          </ion-segment>
        </ion-item>
  
        <ion-button expand="block" type="submit" [disabled]="dadoForm.invalid">Salvar</ion-button>
      </form>
    </ion-row>
  </ion-content>
