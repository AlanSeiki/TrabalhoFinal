<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Little Pig Golden</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <ion-row>
    <ion-col>
      <ion-card style="border-radius: 10px;">
        <ion-card-header style="padding-bottom: 0px;">
          <ion-row>
            <div style="width: 10%;">
              <ion-icon name="{{icone}}" size="large" color="{{color}}"></ion-icon>
            </div>
            <div style="text-align: center; width: 90%;">
              <ion-card-title color="{{color}}">Saldo: {{ saldo | currency:'BRL':'symbol':'1.2-2' }}</ion-card-title>
            </div>
          </ion-row>
        </ion-card-header>
        <ion-card-header style="text-align: center; padding: 10px; padding-top: 0px;">
          <ion-row>
          <ion-text color="success" style="max-height: 70px!important;width: 50%;min-height: 70px!important;">
            <ion-col>
              <h3 style="margin: 0px;">{{lucro | currency:'BRL':'symbol':'1.2-2' }}</h3>
              <h5 style="margin: 0px;">Lucros</h5>
            </ion-col>
          </ion-text>
          <ion-text color="danger" style="max-height: 70px!important;width: 50%;min-height: 70px!important;">
            <ion-col>
              <h3 style="margin: 0px;">{{despesa | currency:'BRL':'symbol':'1.2-2' }}</h3>
              <h5 style="margin: 0px; color:">Despesas</h5>
            </ion-col>
          </ion-text>
        </ion-row>
        </ion-card-header>
      </ion-card>
    </ion-col>
  </ion-row>
  <div style="display: flex;justify-content: space-around;">
    <ion-list style="margin-top: 10px!important;width: 80%;border-radius: 10px;">
      <ion-item *ngFor="let dado of dados">
        <div style="margin-right: 5px;">
          <ion-icon name="{{dado.icone}}" size="large"></ion-icon>
        </div>
        <div style="width: 70%;">
          <ion-label>Descrição: {{dado.descricao}}</ion-label>
          <ion-label *ngIf="dado.tipo == 'D'" color="danger">Valor: R${{dado.valor}}</ion-label>
          <ion-label *ngIf="dado.tipo == 'L'" color="success">Valor: R${{dado.valor}}</ion-label>
          <ion-label *ngIf="dado.tipo == 'M'" color="tertiary">Valor: R${{dado.valor}}</ion-label>
        </div>
      </ion-item>
    </ion-list>
  </div>  
</ion-content>
