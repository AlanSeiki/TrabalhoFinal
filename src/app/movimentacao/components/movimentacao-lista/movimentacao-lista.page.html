<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Movimentações</ion-title>
  </ion-toolbar>
</ion-header>

 <ion-content>
  <ion-list style="margin-top: 10px!important;">
    <ion-item *ngFor="let dado of dados">
      <div style="margin-right: 5px;">
        <ion-icon name="{{dado.icone}}" size="large"></ion-icon>
      </div>
      <div style="width: 70%;">
        <ion-label>Descrição: {{dado.descricao}}</ion-label>
        <ion-label *ngIf="dado.tipo == 'D'" color="danger">Valor: R${{dado.valor}}</ion-label>
        <ion-label *ngIf="dado.tipo == 'L'" color="success">Valor: R${{dado.valor}}</ion-label>
      </div>
      <div>
        <ion-buttons>
          <ion-button color="primary" [routerLink]="['edicao', dado.id,dado.tipo]">
            <ion-icon name="create" slot="icon-only"></ion-icon> 
          </ion-button>
          <ion-button color="primary" (click)="confirmarExclusao(dado)">
            <ion-icon name="trash"  slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </div>
    </ion-item>
  </ion-list>
 
  <ion-fab vertical="bottom" horizontal="end">
    <ion-fab-button [routerLink]="['cadastro','D']">
      <ion-icon name="cash"></ion-icon>
    </ion-fab-button>
  </ion-fab>
  <ion-fab vertical="bottom" horizontal="start">
    <ion-fab-button [routerLink]="['cadastro','L']">
      <ion-icon name="wallet"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
